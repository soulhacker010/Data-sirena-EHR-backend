databases:
  - name: sirena-ehr-db
    plan: free
    databaseName: sirena_ehr
    user: sirena

services:
  - type: web
    name: sirena-ehr-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: sirena-ehr-backend.onrender.com
      - key: DJANGO_ADMIN_URL
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sirena-ehr-backend.onrender.com
      - key: DATABASE_SSL_REQUIRE
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sirena-ehr-db
          property: connectionURI
      - key: DRF_THROTTLE_USER
        value: "200/min"
      - key: DRF_THROTTLE_ANON
        value: "50/min"
      - key: DRF_THROTTLE_LOGIN
        value: "5/min"
      - key: DRF_THROTTLE_EMAIL
        value: "10/min"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: no-reply@sirenahealthehr.com
      - key: RESEND_REPLY_TO
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.0"
